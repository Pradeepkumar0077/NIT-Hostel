<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hostel Management</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">Hostel</span>
  </div>
</nav>

<!-- Hero -->
<header class="hero d-flex align-items-center justify-content-center text-white">
  <h1>Welcome to College Hostel</h1>
</header>

<div class="container my-5">

  <!-- About -->
  <section class="mb-5 text-center">
    <h2>About Hostel</h2>
    <p>Safe hostel with WiFi, mess and 24/7 security.</p>
  </section>

  <!-- Fees -->
  <section class="mb-5">
    <h2 class="text-center">Hostel Fees</h2>
    <table class="table table-striped text-center">
      <tr><th>Room</th><th>Fee</th></tr>
      <tr><td>Single</td><td>₹80,000</td></tr>
      <tr><td>Double</td><td>₹60,000</td></tr>
      <tr><td>Triple</td><td>₹45,000</td></tr>
    </table>
  </section>

  <!-- Leave -->
  <section class="mb-5">
    <h2 class="text-center">Leave Application</h2>
    <form id="leaveForm" class="card p-4 shadow">
      <input class="form-control mb-3" type="text" placeholder="Name" required>
      <input class="form-control mb-3" type="text" placeholder="Room No" required>
      <input class="form-control mb-3" type="date" required>
      <textarea class="form-control mb-3" placeholder="Reason" required></textarea>
      <button class="btn btn-success">Submit</button>
    </form>
  </section>

  <!-- Location -->
  <section class="mb-5">
    <h2 class="text-center">Location</h2>
    <iframe src="https://maps.google.com/maps?q=Lucknow&t=&z=13&ie=UTF8&iwloc=&output=embed" class="w-100 map"></iframe>
  </section>

  <!-- Login -->
  <section>
    <h2 class="text-center">Login</h2>
    <form id="loginForm" class="card p-4 shadow mx-auto" style="max-width:400px">
      <input class="form-control mb-3" id="username" type="text" placeholder="Username" required>
      <input class="form-control mb-3" id="password" type="password" placeholder="Password" required>
      <button class="btn btn-primary">Login</button>
      <p id="loginMsg" class="text-center mt-2"></p>
    </form>
  </section>

</div>

<footer class="bg-dark text-white text-center p-3">
  © 2026 Hostel Management
</footer>

<script src="hostel.js"></script>
</body>
</html>
