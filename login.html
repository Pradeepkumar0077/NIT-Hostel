<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Hostel Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a href="index.html" class="navbar-brand">Hostel Management</a>
  </div>
</nav>

<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="auth-card card shadow-lg p-5" style="max-width: 450px; width: 100%;">
    <h2 class="text-center mb-4">Student Login</h2>

    <form id="loginForm" class="needs-validation">
      <div class="mb-3">
        <label for="username" class="form-label">Username or Email</label>
        <input class="form-control" id="username" type="text" placeholder="Enter your username or email" required>
        <div class="invalid-feedback">Please provide a username or email.</div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input class="form-control" id="password" type="password" placeholder="Enter your password" required>
        <div class="invalid-feedback">Please provide a password.</div>
      </div>

      <div class="mb-3 form-check">
        <input class="form-check-input" id="remember" type="checkbox">
        <label class="form-check-label" for="remember">Remember me</label>
      </div>

      <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>

      <div id="loginMsg" class="alert d-none" role="alert"></div>
    </form>

    <hr>

    <p class="text-center">
      Don't have an account? <a href="signup.html">Sign Up here</a>
    </p>

  </div>
</div>

<footer class="bg-dark text-white text-center p-4 mt-5">
  <p>&copy; 2026 Hostel Management. All rights reserved.</p>
</footer>

<script src="hostel.js"></script>
<script>
  // Login Form Handler
  document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;
    let msgDiv = document.getElementById("loginMsg");

    // Demo credentials
    if (user === "admin" && pass === "1234") {
      // Store login info in localStorage
      localStorage.setItem("isLoggedIn", "true");
      localStorage.setItem("username", user);
      localStorage.setItem("loginTime", new Date().toISOString());
      
      msgDiv.className = "alert alert-success d-block";
      msgDiv.innerText = "Login Successful! Redirecting...";
      
      // Redirect after 1.5 seconds
      setTimeout(function() {
        window.location.href = "dashboard.html";
      }, 1500);
    } else {
      msgDiv.className = "alert alert-danger d-block";
      msgDiv.innerText = "Invalid Credentials. Please try again.";
    }
  });
</script>
</body>
</html>
